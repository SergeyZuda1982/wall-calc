name: Deploy to GitHub Pages
 
on:
  push:
    branches: [main]

# Несколько параллельных чатов иногда пушат в main почти одновременно —
# без этого блока деплой одного пуша конфликтует с ещё идущим деплоем
# другого (see: https://github.com/orgs/community/discussions/60751).
# cancel-in-progress: false — не обрываем уже идущий деплой на середине,
# просто СТАВИМ следующий в очередь (стандартная рекомендация GitHub
# для официального Pages-workflow).
concurrency:
  group: "pages"
  cancel-in-progress: false
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-node@v4
        with:
          node-version: 20
 
      - run: npm install
 
      - run: npm run build
 
      - uses: actions/configure-pages@v4
 
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
 
      - uses: actions/deploy-pages@v4
        id: deployment
 